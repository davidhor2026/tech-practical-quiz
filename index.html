<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>중등임용 기술 전공 실전형 퀴즈</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#1d2433; --muted:#6b7280;
      --brand:#4f46e5; --brand2:#eef2ff; --ok:#16a34a; --bad:#dc2626;
      --line:#e5e7eb; --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f7f7ff 0%,var(--bg) 45%,#fff 100%);
      color:var(--text); min-height:100vh;
    }
    .wrap{width:min(980px,100%); margin:0 auto; padding:10px 8px 24px}
    header{
      display:grid; grid-template-columns:92px 1fr; gap:14px; align-items:center;
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      padding:12px; box-shadow:var(--shadow); margin-bottom:10px;
    }
    .teacher{
      width:92px; height:92px; border-radius:20px; object-fit:cover; background:var(--brand2);
      border:1px solid #dbe3ff;
    }
    .fallback{
      width:92px; height:92px; border-radius:20px; display:grid; place-items:center;
      background:var(--brand2); font-size:42px; border:1px solid #dbe3ff;
    }
    h1{font-size:clamp(21px,5vw,34px); line-height:1.12; margin:0 0 5px}
    .sub{color:var(--muted); font-size:clamp(13px,3.3vw,15px); line-height:1.38}
    .panel{
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      padding:16px; box-shadow:var(--shadow); margin-bottom:14px;
    }
    .topbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between}
    select,button{
      font:inherit; border-radius:14px; border:1px solid var(--line); background:#fff;
      padding:10px 12px; color:var(--text); font-size:15px;
    }
    button{cursor:pointer; font-weight:700}
    button.primary{background:var(--brand); color:#fff; border-color:var(--brand)}
    button.ghost{background:#f9fafb}
    button:disabled{opacity:.55; cursor:not-allowed}
    .stat{font-size:13px; color:var(--muted); font-weight:700}
    .bar{height:8px; background:#eef2ff; border-radius:999px; overflow:hidden; margin:8px 0 2px}
    .bar > div{height:100%; width:0%; background:var(--brand); transition:.25s}
    .question-card{padding:12px}
    .meta{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px}
    .badge{font-size:11px; padding:5px 8px; border-radius:999px; background:var(--brand2); color:#3730a3; font-weight:800}
    .qtitle{font-size:clamp(18px,4.8vw,26px); line-height:1.35; font-weight:850; margin:6px 0 10px; word-break:keep-all}
    .choices{display:grid; gap:10px}
    .choice{
      display:flex; gap:10px; align-items:flex-start; width:100%; text-align:left; line-height:1.45;
      padding:10px 11px; border:1px solid var(--line); background:#fff; border-radius:14px;
      transition:.15s; font-weight:680; font-size:clamp(14px,3.8vw,18px);
    }
    .choice:hover{transform:translateY(-1px); border-color:#c7d2fe}
    .num{
      flex:0 0 26px; height:26px; border-radius:50%; background:#f3f4f6;
      display:grid; place-items:center; font-weight:900; color:#4b5563;
    }
    .choice.correct{border-color:#86efac; background:#f0fdf4}
    .choice.correct .num{background:#dcfce7; color:#166534}
    .choice.wrong{border-color:#fecaca; background:#fef2f2}
    .choice.wrong .num{background:#fee2e2; color:#991b1b}
    .hintbox,.explain{
      margin-top:10px; border-radius:14px; padding:10px; line-height:1.45; display:none; font-size:clamp(13px,3.6vw,16px);
      border:1px solid var(--line); background:#fffbeb;
    }
    .explain{background:#f8fafc}
    .resultline{
      display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:14px;
    }
    .reaction{
      width:74px; height:74px; border-radius:18px; object-fit:cover; border:1px solid var(--line);
      background:#f3f4f6; display:none;
    }
    .reactionFallback{font-size:42px; display:none}
    .small{font-size:13px; color:var(--muted); line-height:1.4}
    .footerBtns{display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; margin-top:16px}
    .score{
      display:grid; gap:10px; text-align:center; padding:24px 16px;
    }
    .score h2{font-size:clamp(28px,6vw,42px); margin:0}
    .reviewList{display:grid; gap:10px; margin-top:12px}
    .reviewItem{padding:12px; border:1px solid var(--line); border-radius:14px; background:#fff; line-height:1.5}
    .loading{padding:30px; text-align:center; color:var(--muted)}
    @media (max-width:560px){
      body{background:#f6f7fb}
      .wrap{padding:6px 6px 16px}
      header{
        grid-template-columns:54px 1fr;
        gap:8px;
        padding:8px;
        border-radius:16px;
        margin-bottom:6px;
      }
      .teacher,.fallback{width:54px;height:54px;border-radius:13px}
      .fallback{font-size:28px}
      h1{font-size:20px; line-height:1.08; margin-bottom:2px}
      .sub{font-size:12px; line-height:1.25}
      .panel{padding:8px; border-radius:16px; margin-bottom:6px}
      .question-card{padding:9px}
      .meta{gap:5px; margin-bottom:6px}
      .badge{font-size:10px; padding:4px 7px}
      .qtitle{
        font-size:18px;
        line-height:1.34;
        letter-spacing:-0.2px;
        margin:4px 0 8px;
      }
      .choices{gap:6px}
      .choice{
        padding:9px 9px;
        border-radius:13px;
        font-size:15px;
        line-height:1.34;
        min-height:46px;
      }
      .num{
        flex-basis:25px;
        width:25px;
        height:25px;
        font-size:13px;
        margin-top:0;
      }
      select,button{
        width:100%;
        font-size:14px;
        padding:9px 10px;
        min-height:38px;
      }
      .topbar{display:grid; grid-template-columns:1fr 1fr; width:100%; gap:6px}
      .topbar select{grid-column:1 / -1}
      .topbar .stat{grid-column:1 / -1}
      .stat{font-size:12px; text-align:center}
      .bar{height:7px; margin-top:6px}
      .footerBtns{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:8px}
      .hintbox,.explain{
        font-size:13px;
        line-height:1.42;
        padding:9px;
        border-radius:13px;
        margin-top:8px;
      }
      .resultline{gap:8px; margin-top:8px}
      .reaction{width:46px;height:46px;border-radius:12px}
      .reactionFallback{font-size:30px}
      .reviewItem{font-size:13px; padding:9px}
      .score{padding:14px 8px; gap:8px}
      .score h2{font-size:28px}
    }

    @media (max-width:380px){
      h1{font-size:18px}
      .sub{font-size:11px}
      .qtitle{font-size:17px}
      .choice{font-size:14px; padding:8px}
      select,button{font-size:13px}
      .teacher,.fallback{width:50px;height:50px}
      header{grid-template-columns:50px 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img class="teacher" src="teacher.png" alt="진행자 이미지" onerror="this.style.display='none';document.getElementById('teacherFallback').style.display='grid';">
      <div id="teacherFallback" class="fallback" style="display:none">👩‍🏫</div>
      <div>
        <h1>중등임용 기술 전공 실전형 퀴즈</h1>
        <div class="sub">기출 경향을 반영한 실전형 퀴즈입니다. 계산형·판단형 문항 포함 · 오류 발견 시 확인 후 바로 수정합니다 · 스테이The머무름</div>
      </div>
    </header>

    <section class="panel">
      <div class="topbar">
        <select id="categorySelect" aria-label="카테고리 선택">
          <option value="전체">전체 영역</option>
        </select>
        <button class="ghost" id="resetBtn">처음으로</button>
        <button class="ghost" id="wrongTopBtn" disabled>오답풀기</button>
        <div class="stat" id="stat">문제 불러오는 중...</div>
      </div>
      <div class="bar"><div id="progress"></div></div>
    </section>

    <main id="app" class="panel loading">questions.csv 파일을 불러오고 있습니다.</main>
  </div>

<script>
const IMAGE = {
  teacher: "teacher.png",
  correct: "correct.png",
  wrong: "wrong.png"
};

let allQuestions = [];
let quiz = [];
let idx = 0;
let score = 0;
let answered = false;
let wrongNotes = [];

const app = document.getElementById("app");
const stat = document.getElementById("stat");
const progress = document.getElementById("progress");
const categorySelect = document.getElementById("categorySelect");

function parseCSV(text){
  const rows = [];
  let row = [], cur = "", inQuotes = false;
  for(let i=0;i<text.length;i++){
    const ch = text[i], next = text[i+1];
    if(ch === '"' && inQuotes && next === '"'){ cur += '"'; i++; continue; }
    if(ch === '"'){ inQuotes = !inQuotes; continue; }
    if(ch === "," && !inQuotes){ row.push(cur); cur = ""; continue; }
    if((ch === "\n" || ch === "\r") && !inQuotes){
      if(ch === "\r" && next === "\n") i++;
      row.push(cur); rows.push(row); row = []; cur = "";
      continue;
    }
    cur += ch;
  }
  if(cur.length || row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(c => String(c).trim() !== ""));
}

function csvToObjects(text){
  text = text.replace(/^\uFEFF/, "");
  const rows = parseCSV(text);
  const headers = rows.shift().map(h => h.trim());
  return rows.map(r => {
    const obj = {};
    headers.forEach((h,i)=> obj[h] = (r[i] ?? "").trim());
    return obj;
  }).filter(q => q.question);
}

function escapeHTML(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}

function setupCategories(){
  const cats = ["전체", ...new Set(allQuestions.map(q => q.category).filter(Boolean))];
  categorySelect.innerHTML = cats.map(c => `<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`).join("");
}

function startQuiz({shuffleIt=false}={}){
  const cat = categorySelect.value || "전체";
  quiz = allQuestions.filter(q => cat === "전체" || q.category === cat);
  if(shuffleIt) shuffle(quiz);
  idx = 0; score = 0; answered = false; wrongNotes = [];
  renderQuestion();
}

function updateStat(){
  const wrongTopBtn = document.getElementById("wrongTopBtn");
  if(wrongTopBtn){
    wrongTopBtn.disabled = wrongNotes.length === 0;
    wrongTopBtn.textContent = wrongNotes.length ? `오답풀기 (${wrongNotes.length})` : "오답풀기";
  }
  if(!quiz.length){ stat.textContent = "문항 없음"; progress.style.width = "0%"; return; }
  stat.textContent = `${idx+1} / ${quiz.length} · 점수 ${score}`;
  progress.style.width = `${(idx/quiz.length)*100}%`;
}

function renderQuestion(){
  if(!quiz.length){
    app.className = "panel loading";
    app.innerHTML = "선택한 영역에 문제가 없습니다.";
    return;
  }
  if(idx >= quiz.length){ renderResult(); return; }
  answered = false;
  const q = quiz[idx];
  const choices = [q.choice1,q.choice2,q.choice3,q.choice4];
  app.className = "panel question-card";
  app.innerHTML = `
    <div class="meta">
      <span class="badge">${escapeHTML(q.category)}</span>
      <span class="badge">${escapeHTML(q.type || "객관식")}</span>
    </div>
    <div class="qtitle">${escapeHTML(q.id)}. ${escapeHTML(q.question)}</div>
    <div class="choices">
      ${choices.map((c,i)=>`
        <button class="choice" data-choice="${i+1}">
          <span class="num">${i+1}</span>
          <span>${escapeHTML(c)}</span>
        </button>
      `).join("")}
    </div>
    <div class="footerBtns">
      <button class="ghost" id="hintBtn">힌트 보기</button>
      <button class="primary" id="nextBtn" disabled>다음 문제</button>
    </div>
    <div class="hintbox" id="hintBox">💡 ${escapeHTML(q.hint)}</div>
    <div class="resultline">
      <img class="reaction" id="reactionImg" alt="반응 이미지">
      <span class="reactionFallback" id="reactionFallback"></span>
      <div class="explain" id="explainBox"></div>
    </div>
  `;
  document.querySelectorAll(".choice").forEach(btn => btn.addEventListener("click", () => choose(btn)));
  document.getElementById("hintBtn").addEventListener("click", () => {
    const hb = document.getElementById("hintBox");
    hb.style.display = hb.style.display === "block" ? "none" : "block";
  });
  document.getElementById("nextBtn").addEventListener("click", () => { idx++; renderQuestion(); });
  updateStat();
}

function choose(btn){
  if(answered) return;
  answered = true;
  const q = quiz[idx];
  const selected = btn.dataset.choice;
  const answer = String(q.answer).trim();
  const isCorrect = selected === answer;
  if(isCorrect) score++;
  else wrongNotes.push(q);

  document.querySelectorAll(".choice").forEach(b => {
    b.disabled = true;
    if(b.dataset.choice === answer) b.classList.add("correct");
    if(b.dataset.choice === selected && !isCorrect) b.classList.add("wrong");
  });

  const img = document.getElementById("reactionImg");
  const fb = document.getElementById("reactionFallback");
  img.src = isCorrect ? IMAGE.correct : IMAGE.wrong;
  img.style.display = "block";
  img.onerror = () => { img.style.display = "none"; fb.style.display = "inline"; fb.textContent = isCorrect ? "🎉" : "😢"; };

  const explain = document.getElementById("explainBox");
  explain.style.display = "block";
  explain.innerHTML = `
    <strong style="color:${isCorrect ? 'var(--ok)' : 'var(--bad)'}">${isCorrect ? '정답입니다!' : '아쉽습니다.'}</strong><br>
    <strong>정답:</strong> ${escapeHTML(answer)}번<br>
    <strong>해설:</strong> ${escapeHTML(q.explanation)}
  `;
  document.getElementById("nextBtn").disabled = false;
  updateStat();
}

function renderResult(){
  progress.style.width = "100%";
  stat.textContent = `완료 · ${score} / ${quiz.length}`;
  const pct = Math.round(score / quiz.length * 100);
  app.className = "panel score";
  app.innerHTML = `
    <h2>${score} / ${quiz.length}점</h2>
    <div class="sub">정답률 ${pct}%</div>
    <div class="footerBtns">
      <button class="primary" id="againBtn">다시 풀기</button>
      <button class="ghost" id="wrongBtn" ${wrongNotes.length ? "" : "disabled"}>오답풀기 (${wrongNotes.length})</button>
    </div>
    <div class="reviewList">
      ${wrongNotes.length ? wrongNotes.map(q => `
        <div class="reviewItem">
          <strong>${escapeHTML(q.id)}번</strong> ${escapeHTML(q.question)}<br>
          <span class="small">정답 ${escapeHTML(q.answer)}번 · ${escapeHTML(q.explanation)}</span>
        </div>
      `).join("") : `<div class="reviewItem">틀린 문제가 없습니다. 훌륭합니다.</div>`}
    </div>
  `;
  document.getElementById("againBtn").addEventListener("click", () => startQuiz({shuffleIt:true}));
  document.getElementById("wrongBtn").addEventListener("click", startWrongQuiz);
}

function startWrongQuiz(){
  if(!wrongNotes.length){
    alert("아직 틀린 문제가 없습니다.");
    return;
  }
  quiz = [...wrongNotes];
  shuffle(quiz);
  idx = 0;
  score = 0;
  wrongNotes = [];
  renderQuestion();
}

async function loadQuestions(){
  try{
    const res = await fetch("questions.csv", {cache:"no-store"});
    if(!res.ok) throw new Error("CSV 파일을 찾을 수 없습니다.");
    const text = await res.text();
    allQuestions = csvToObjects(text);
    if(!allQuestions.length) throw new Error("CSV 안에 문제가 없습니다.");
    setupCategories();
    startQuiz({shuffleIt:true});
  }catch(err){
    app.className = "panel loading";
    app.innerHTML = `
      <strong>문제를 불러오지 못했습니다.</strong><br><br>
      index.html과 questions.csv를 같은 폴더에 올렸는지 확인해 주세요.<br>
      <span class="small">${escapeHTML(err.message)}</span>
    `;
    stat.textContent = "불러오기 실패";
  }
}

document.getElementById("resetBtn").addEventListener("click", () => startQuiz({shuffleIt:true}));
document.getElementById("wrongTopBtn").addEventListener("click", startWrongQuiz);
categorySelect.addEventListener("change", () => startQuiz({shuffleIt:true}));
loadQuestions();
</script>
</body>
</html>
